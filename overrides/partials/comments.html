          data-repo="vigilux418/notebook"

          data-category="Announcements"
          data-category-id="DIC_kwDOOpylRM4CuxK_"
          data-mapping="pathname"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="bottom"
          data-theme="light"
          data-lang="zh-CN"
          crossorigin="anonymous"
          async>
  </script>
  <!-- Synchronize Giscus theme with palette (instant-navigation safe) -->
  <script>
    (function () {
      // 从站点调色板推导 giscus 主题：直接读 body 上的 data-md-color-scheme，
      // 该属性由 Material 在切换时同步写入，比 __md_get 更少竞态。
      function giscusTheme() {
        var scheme = document.body.getAttribute("data-md-color-scheme");
        return scheme === "slate" ? "transparent_dark" : "light";
      }

      // 同时覆盖两种状态：尚未加载完的 loader <script> 与已加载的 iframe。
      function syncGiscus() {
        var theme = giscusTheme();
        var loader = document.querySelector("script[src*=giscus]");
        if (loader) loader.setAttribute("data-theme", theme);
        var frame = document.querySelector("iframe.giscus-frame");
        if (frame && frame.contentWindow) {
          frame.contentWindow.postMessage(
            { giscus: { setConfig: { theme: theme } } },
            "https://giscus.app"
          );
        }
      }

      // ① 本页立即同步一次（首屏 / 硬加载）。
      syncGiscus();

      // ② 每次 instant 软导航后再同步一次；subscribe 全局仅一次，避免重复订阅。
      if (window.document$ && typeof document$.subscribe === "function"
          && !window.__giscusSubscribed) {
        window.__giscusSubscribed = true;
        document$.subscribe(syncGiscus);
      }

      // ③ 调色板切换监听：事件委托挂到常驻的 document 上，且全局仅挂一次，
      //    这样 instant 软导航到的新页面也能生效，无需刷新。
      if (!window.__giscusThemeHooked) {
        window.__giscusThemeHooked = true;
        document.addEventListener("change", function (e) {
          if (e.target && e.target.closest &&
              e.target.closest("[data-md-component=palette]")) {
            // 等 Material 把新的 data-md-color-scheme 写到 body 之后再读取。
            setTimeout(syncGiscus, 0);
          }
        });
      }
    })();
  </script>
{% endif %}
