# 有意不放进导航栏的独立页面（从首页链接进入），抑制构建时的 "not in nav" INFO 提示
not_in_nav: |
  /links.md
  /spirit.md
extra_css:
    - stylesheets/extra.css
    - stylesheets/custom.css
    - stylesheets/status.css
    - stylesheets/fold_toc.css   # 目录智能展开样式（配合全局 toc.js，随 instant 导航常驻）
    - stylesheets/links.css      # 友链页卡片（限定 #links 作用域，避免与首页全息卡 .card 冲突）
    - https://gcore.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.1.0/style.css
    - https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap
extra_javascript:
    # 全部自定义脚本改为「全局加载 + 订阅 document$」，以兼容 navigation.instant（软导航）。
    # 各脚本均幂等：IIFE/module 隔离作用域、window 级守卫避免重复订阅、切页回收旧资源。
    - javascripts/effects.js   # 粒子背景加载器（尊重 prefers-reduced-motion，整站仅注入一次）
    - javascripts/toc.js       # 目录智能展开（每次导航重建 IntersectionObserver）
    - javascripts/mathjax.js   # MathJax 配置 + 跨页重排（引擎本体由 engines.js 懒加载）
    # 重型引擎：MathJax 懒加载（engines.js）+ Mermaid 软导航重渲染（mermaid.mjs）
    - path: javascripts/engines.js
      type: module
    - path: javascripts/mermaid.mjs
      type: module
    # 首页全息卡片：module 保证仅执行一次、作用域隔离；靠 document$ 挂载/卸载。
    - path: javascripts/card.js
      type: module
    # 首页打字标语 / 运行时长 / 统计开关：仅首页激活，typed.js 懒加载，切页回收。
    - path: javascripts/home.js
      type: module
theme: 
    name: material
    custom_dir: overrides
    palette:
        # Palette toggle for light mode
        - media: "(prefers-color-scheme: light)"
          primary: custom
          scheme: default
          toggle: 
            icon: material/weather-sunny
            name: Switch to dark mode
        # Palette toggle for dark mode
        - media: "(prefers-color-scheme: dark)"
          primary: custom
          scheme: slate
          toggle: 
            icon: material/weather-night
            name: Switch to light mode
    font: false
    features:
        - navigation.instant           # 即时加载（软导航，XHR 换页不整页刷新）
        - navigation.instant.progress   # 慢加载时显示顶部进度条
        - navigation.tracking
        - navigation.tabs
        - navigation.tabs.sticky
        # - navigation.sections
        - navigation.expand
        - navigation.prune
        - navigation.indexes
        - toc.follow
        - navigation.top
        - search.highlight
        - search.share
        - search.suggest
        # - header.autohide
        - navigation.footer
        - content.action.edit
        - content.action.view
        - content.code.copy
        - content.code.annotate
        - content.tabs.link
        - content.tooltips
    language: zh
    icon: 
        logo: fontawesome/solid/book-atlas
        repo: fontawesome/brands/git-alt
        edit: material/file-edit
        view: material/file-eye
        admonition:
          note: octicons/tag-16
          abstract: octicons/checklist-16
          info: octicons/info-16
          tip: octicons/squirrel-16
          success: octicons/check-16
          question: octicons/question-16
          warning: octicons/alert-16
          failure: octicons/x-circle-16
          danger: octicons/zap-16
          bug: octicons/bug-16
          example: octicons/beaker-16
          quote: octicons/quote-16
        annotation: material/plus-circle
    favicon: images/favicon.png
markdown_extensions:
    - meta
    - toc:
        permalink: "⚓︎"
    - abbr
    - pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets: 
        auto_append:
          - includes/abbreviations.md
    - admonition
    - pymdownx.details
    - pymdownx.superfences:
        custom_fences:
          - name: mermaid
            class: mermaid
            format: !!python/name:pymdownx.superfences.fence_code_format
    - pymdownx.tabbed:
        alternate_style: true
        slugify: !!python/object/apply:pymdownx.slugs.slugify
          kwds:
            case: lower
    - attr_list
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - md_in_html
    - tables
    - footnotes
    - pymdownx.critic
    - pymdownx.caret
    - pymdownx.keys
    - pymdownx.mark
    - pymdownx.tilde
    - pymdownx.blocks.caption
    - def_list
    - pymdownx.tasklist: 
        custom_checkbox: true
    - pymdownx.arithmatex: 
        generic: true
    - pymdownx.betterem
    - pymdownx.smartsymbols
plugins:
    - macros: 
        # [[% raw %]]
        j2_block_start_string: '[[%'
        j2_block_end_string: '%]]'
        j2_variable_start_string: '[['
        j2_variable_end_string: ']]'
        # [[% endraw %]]   
    - meta
    - search: 
        lang:
            - en
            - zh
        separator: '[\s\u200b\-]'
    - git-revision-date-localized:
        type: datetime
        timezone: Asia/Shanghai
        locale: zh
        exclude: 
          - index.md
        fallback_to_build_date: true
        enable_creation_date: true
    - glightbox
    - statistics:
        page_check_metadata: comments
