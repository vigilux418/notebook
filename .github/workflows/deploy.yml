name: Deploy Docs
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:  # 新增权限声明
      contents: write  # 授予写入仓库的权限
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # 拉取完整历史，供 git-revision-date-localized 插件生成准确的“最后更新”日期
      - uses: actions/setup-python@v7
        with:
          python-version: '3.13'  # 钉死版本，避免 runner 默认 Python 漂移破坏构建
      - run: pip install -r requirements.txt
      - run: mkdocs gh-deploy --force --strict  # strict：任何构建警告都会使 CI 失败，问题不过夜